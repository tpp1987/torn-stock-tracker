<!DOCTYPE html>
<html>
<head>
  <title>Torn Stock Tracker</title>
</head>
<body>
  <h1>Torn Stock Data</h1>
  <pre id="output">Loading...</pre>

  <script>
  async function loadData() {
    const res = await fetch('./data/stocks.json');
    const data = await res.json();
  
    if (!data || data.length === 0) {
      document.getElementById("output").textContent = "No data yet.";
      return;
    }
  
    const latest = data[data.length - 1];
    const recent = data.slice(-24);
  
    let results = [];
  
    for (const [id, info] of Object.entries(latest.stocks)) {
  
      let prices = [];
  
      for (const snapshot of recent) {
        if (snapshot.stocks[id]) {
          prices.push(snapshot.stocks[id].current_price);
        }
      }
  
      if (prices.length < 5) continue;
  
      const current = info.current_price;
      const min = Math.min(...prices);
      const max = Math.max(...prices);
  
      if (max === min) continue;
  
      const rangeSize = ((max - min) / min) * 100;
  
      // Only skip completely flat stocks
      if (rangeSize < 0.05) continue;
  
      const position = (current - min) / (max - min);
  
      let signal = "HOLD";
      if (position < 0.2) signal = "BUY";
      if (position > 0.8) signal = "SELL";
  
      results.push({
        code: info.acronym || id,
        name: info.name,
        current,
        min,
        max,
        position,
        signal
      });
    }
  
    results.sort((a, b) => a.position - b.position);
  
    let output = `Timestamp: ${latest.timestamp}\n\n`;
  
    if (results.length === 0) {
      output += "No qualifying stocks (market very flat right now)";
    }
  
    for (const r of results) {
      output += `${r.code} - ${r.name}\n`;
      output += `  Current: ${r.current.toFixed(2)}\n`;
      output += `  Range:   ${r.min.toFixed(2)} - ${r.max.toFixed(2)}\n`;
      output += `  Pos:     ${(r.position * 100).toFixed(1)}%\n`;
      output += `  Signal:  ${r.signal}\n\n`;
    }
  
    document.getElementById("output").textContent = output;
  }
  
  loadData();
  </script>
</body>
</html>
